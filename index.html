<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Capstone</title>
    <meta charset="utf-8" />
  </head>
  <body>
    <header>
      <!-- We only one h1 per html document -->
      <h1>Foundations Web Dev</h1>
    </header>
    <main>
      <section>
        <h2>This is my sub-header</h2>
        <!--Below is an inline tag called a break tag <br> -->
        <p>This block of text <br />is smaller than my h2</p>
      </section>
      <section>
        <h2>My Favourite Animals</h2>
        <ol>
          <li>Sloth</li>
          <li>Cats</li>
          <li>Elephants</li>
        </ol>
      </section>
      <section>
        <!--Below is an example of an inline tag inside my h2, it will italicize the word hierarchy-->
        <h2>Here's an example of the <em>hierarchy</em> of heading tags</h2>
        <h1>Heading 1</h1>
        <h2>Heading 2</h2>
        <h3>Heading 3</h3>
        <h4>Heading 4</h4>
        <h5>Heading 5</h5>
        <h6>Heading 6</h6>
      </section>
    </main>
    <footer>
      <!--Here is another inline element that makkes words bold-->
      <p>
        <strong>Coded</strong> by
        <a href="https://www.linkedin.com/in/elle-swampy/">Elle</a>
      </p>
    </footer>
  </body>
</html>
